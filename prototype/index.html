<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumen — Academic Research Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-ui: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Mono', monospace;
    --bg: oklch(0.985 0.006 80);
    --surface: #ffffff;
    --border: oklch(0.91 0.008 80);
    --text: oklch(0.13 0.015 80);
    --muted: oklch(0.55 0.01 80);
    --accent: oklch(0.42 0.14 260);
    --accent-light: oklch(0.96 0.02 260);
    --teal: oklch(0.45 0.12 170);
  }

  html, body, #root {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(0.88 0.01 80); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(0.72 0.02 80); }

  button:hover { opacity: 0.92; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; width: 260px;
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 8px 32px oklch(0 0 0 / 0.12); z-index: 9999;
    display: none; overflow: hidden; font-family: var(--font-ui);
  }
  #tweaks-panel.open { display: block; }
  .tweaks-header { padding: 12px 16px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  .tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  .tweak-row { display: flex; flex-direction: column; gap: 5px; }
  .tweak-label { font-size: 11px; font-weight: 600; color: oklch(0.35 0.01 80); }
  .tweak-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-opt { font-size: 11px; padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-family: var(--font-ui); transition: all 0.12s; }
  .tweak-opt.active { background: var(--accent-light); color: var(--accent); border-color: oklch(0.8 0.06 260); font-weight: 600; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <div class="tweaks-header">Tweaks</div>
  <div class="tweaks-body" id="tweaks-body"></div>
</div>

<!-- Original app shell -->
<script type="text/babel" src="components/Sidebar.jsx"></script>
<script type="text/babel" src="components/HomeView.jsx"></script>
<script type="text/babel" src="components/FilesView.jsx"></script>
<script type="text/babel" src="components/LibraryView.jsx"></script>
<script type="text/babel" src="components/PKMView.jsx"></script>
<script type="text/babel" src="components/AKMView.jsx"></script>
<script type="text/babel" src="components/notes/NotesData.jsx"></script>
<script type="text/babel" src="components/notes/NotesParts.jsx"></script>
<script type="text/babel" src="components/notes/NotesView.jsx"></script>
<script type="text/babel" src="components/ProfileView.jsx"></script>
<script type="text/babel" src="components/AlexandriaView.jsx"></script>
<script type="text/babel" src="components/CommunityView.jsx"></script>

<!-- Per-paper Research Assistant (replaces old EditorView) -->
<script type="text/babel" src="components/research/data.jsx"></script>
<script type="text/babel" src="components/research/Shared.jsx"></script>
<script type="text/babel" src="components/research/Chrome.jsx"></script>
<script type="text/babel" src="components/research/WriteView.jsx"></script>
<script type="text/babel" src="components/research/ResearchView.jsx"></script>
<script type="text/babel" src="components/research/WebBrowserTab.jsx"></script>
<script type="text/babel" src="components/research/ChatPanel.jsx"></script>
<script type="text/babel">
const PAPER_OVERRIDES = {
  'paper-1': { title: 'Diamond OA Framework', fullTitle: 'Open Knowledge Infrastructure: A Framework for Diamond Open Access', workspacePath: '~/Documents/LumenWorkspace / papers / diamond-oa-framework', status: 'Draft' },
  'paper-2': { title: 'Peer Review Economics', fullTitle: 'Peer review labour and its economic invisibility in academic publishing', workspacePath: '~/Documents/LumenWorkspace / papers / peer-review-economics', status: 'Revising' },
};
function PaperWorkspace({ papers, activePaperId }) {
  const overrides = PAPER_OVERRIDES[activePaperId] || {};
  const paper = React.useMemo(() => ({ ...PAPER_DATA, ...overrides }), [activePaperId]);
  const stateKey = `lumen_paper_${activePaperId}`;
  const saved = (() => { try { return JSON.parse(localStorage.getItem(stateKey) || '{}'); } catch { return {}; } })();
  const [view, setView] = React.useState(saved.view || 'Write');
  const [status, setStatus] = React.useState(saved.status || paper.status);
  React.useEffect(() => { setStatus(paper.status); }, [activePaperId]);
  React.useEffect(() => { localStorage.setItem(stateKey, JSON.stringify({ view, status })); }, [view, status, stateKey]);
  return (
    <div key={activePaperId} style={{ display: 'flex', flexDirection: 'column', flex: 1, height: '100%', overflow: 'hidden', background: '#fff' }}>
      <Topbar view={view} setView={setView} status={status} setStatus={setStatus} workspacePath={paper.workspacePath} />
      <div style={{ display: 'flex', flex: 1, minHeight: 0, overflow: 'hidden' }}>
        <VerticalToolbar />
        {view === 'Write' ? <WriteView paper={paper} /> : <ResearchView paper={paper} />}
      </div>
    </div>
  );
}
</script>

<script type="text/babel">
const PAPERS = [
  { id: 'paper-1', shortTitle: 'Diamond OA Framework', title: 'Open Knowledge Infrastructure: A Framework for Diamond Open Access', status: 'Draft' },
  { id: 'paper-2', shortTitle: 'Peer Review Economics', title: 'Peer review labour and its economic invisibility in academic publishing', status: 'Revising' },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": "260",
  "density": "comfortable",
  "showBanner": "true"
}/*EDITMODE-END*/;

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('lumen_nav') || '{}'); } catch { return {}; } })();
  const [view, setView] = React.useState(saved.view || 'home');
  const [activePaper, setActivePaper] = React.useState(saved.paper || 'paper-1');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    localStorage.setItem('lumen_nav', JSON.stringify({ view, paper: activePaper }));
  }, [view, activePaper]);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', `oklch(0.42 0.14 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-light', `oklch(0.96 0.02 ${tweaks.accentHue})`);
  }, [tweaks.accentHue]);

  React.useEffect(() => {
    const handleMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').classList.add('open');
        renderTweaks();
      }
      if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').classList.remove('open');
      }
    };
    window.addEventListener('message', handleMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handleMsg);
  }, []);

  const setTweak = (key, val) => {
    setTweaks(t => {
      const next = { ...t, [key]: val };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
      renderTweaks(next);
      return next;
    });
  };

  const renderTweaks = (t = tweaks) => {
    const body = document.getElementById('tweaks-body');
    if (!body) return;
    body.innerHTML = '';
    const rows = [
      { key: 'accentHue', label: 'Accent color', opts: [{ label: 'Indigo', val: '260' }, { label: 'Teal', val: '195' }, { label: 'Crimson', val: '20' }, { label: 'Violet', val: '290' }] },
      { key: 'density', label: 'Density', opts: [{ label: 'Comfortable', val: 'comfortable' }, { label: 'Compact', val: 'compact' }] },
    ];
    rows.forEach(row => {
      const div = document.createElement('div');
      div.className = 'tweak-row';
      const label = document.createElement('div');
      label.className = 'tweak-label';
      label.textContent = row.label;
      div.appendChild(label);
      const opts = document.createElement('div');
      opts.className = 'tweak-opts';
      row.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'tweak-opt' + (t[row.key] === opt.val ? ' active' : '');
        btn.textContent = opt.label;
        btn.onclick = () => setTweak(row.key, opt.val);
        opts.appendChild(btn);
      });
      div.appendChild(opts);
      body.appendChild(div);
    });
  };

  const handleOpenPaper = (paperId) => {
    if (paperId) {
      setActivePaper(paperId);
      setView('editor');
    }
  };

  const compact = tweaks.density === 'compact';

  return (
    <div style={{
      display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden',
      fontSize: compact ? '13px' : '14px',
    }}>
      <Sidebar
        active={view}
        setActive={setView}
        papers={PAPERS}
        activePaper={activePaper}
        setActivePaper={setActivePaper}
      />
      <main style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {view === 'home' && <HomeView setActive={setView} />}
        {view === 'library' && <LibraryView onOpenPaper={handleOpenPaper} />}
        {view === 'editor' && <PaperWorkspace papers={PAPERS} activePaperId={activePaper} />}
        {view === 'pkm' && <AKMView />}
        {view === 'alexandria' && <AlexandriaView />}
        {view === 'community' && <CommunityView />}
        {view === 'profile' && <ProfileView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
